name: 我在校园打卡

on:
  workflow_dispatch:
  schedule:
     # cron 使用 UTC。北京时间 = UTC+8（全年不变）。
     # GitHub 定时任务常有排队延迟（数十分钟到约 1 小时），若按「名义 22:10」设 UTC 14:10，实际可能 23 点才跑，错过 22–23 点窗口。
     # 故整体提前 1 小时：名义约 21:10/21:30（北京），延迟后更容易落在 22:00–23:00 内。
     - cron:  '10 13 * * *' # UTC 13:10 → 名义 北京时间 21:10
     - cron:  '30 13 * * *' # UTC 13:30 → 名义 北京时间 21:30

jobs:
  User01:
    runs-on: ubuntu-latest
    environment: CONFIG_01
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.9
      uses: actions/setup-python@v6
      with:
        python-version: 3.9
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: 执行打卡
      env:
        school_name: ${{secrets.school_name}}
        receive_mail: ${{secrets.receive_mail}}
        mail_address: ${{secrets.mail_address}}
        mail_password: ${{secrets.mail_password}}
        mail_host: ${{secrets.mail_host}}
        punch_location: ${{secrets.punch_location}}
        wzxy_username: ${{secrets.wzxy_username}}
        wzxy_password: ${{secrets.wzxy_password}}
        sct_ftqq: ${{secrets.sct_ftqq}}
        dorm_sign: ${{secrets.dorm_sign}}
        blue_sign: ${{secrets.blue_sign}}
        tencentKey: ${{secrets.tencentKey}}
        WZXY_SCHOOL_AREA: ${{secrets.WZXY_SCHOOL_AREA}}
      run: python actionVersion.py

